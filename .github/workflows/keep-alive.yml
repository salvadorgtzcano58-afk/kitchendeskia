name: Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kitchendeskia.vercel.app/api/keep-alive)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status $STATUS"
            exit 1
          fi
